<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .article-image {
        float: left;
        /* 图片左浮动 */
        margin-right: 15px;
        /* 给文字留点空隙 */
        width: 100px;
        height: 100px;
        shape-outside: circle(50%);
        /* 进阶：让文字沿着圆形图片边缘排列，而不是矩形 */
    }
</style>

<body>
    <div class="article">
        <h1>浮动演示</h1>
        <p>这是一段文字</p>
        <p>这是一段文字</p>
        <p>这是一段文字</p>
        <img class="article-image" src="https://www.w3school.com.cn/i/eg_tulip.jpg" alt="图片">
        <p>这是一段文字</p>
        <p>这是一段文字</p>
        <p>这是一段文字</p>
        <p>这是一段文字</p>
        <p>这是一段文字</p>
        <p>这是一段文字</p>

    </div>

</body>

</html>
