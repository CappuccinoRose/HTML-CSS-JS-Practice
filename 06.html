<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认对话框</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        /* 遮罩层样式 */
        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
        }

        /* 对话框样式 */
        dialog {
            border: none;
            border-radius: 12px;
            padding: 0;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        dialog[open] {
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        dialog p {
            padding: 24px 24px 16px;
            margin: 0;
            font-size: 16px;
            color: #333;
        }

        dialog .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 0 16px 16px;
        }

        dialog button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        dialog button[value="cancel"] {
            background: #f0f0f0;
            color: #666;
        }

        dialog button[value="cancel"]:hover {
            background: #e0e0e0;
        }

        dialog button[value="delete"] {
            background: #ff4757;
            color: white;
        }

        dialog button[value="delete"]:hover {
            background: #ff3344;
        }

        /* 触发按钮 */
        .trigger-btn {
            padding: 12px 24px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button class="trigger-btn" id="openBtn">删除项目</button>

    <dialog id="confirmBox">
        <form method="dialog">
            <p>确定删除吗？此操作不可撤销。</p>
            <div class="btn-group">
                <button value="cancel">取消</button>
                <button value="delete">删除</button>
            </div>
        </form>
    </dialog>

    <script>
        const dialog = document.getElementById('confirmBox');
        const openBtn = document.getElementById('openBtn');

        // 点击按钮打开对话框
        openBtn.addEventListener('click', () => {
            dialog.showModal();
        });

        // 关闭时的回调
        dialog.addEventListener('close', () => {
            if (dialog.returnValue === 'delete') {
                console.log('执行删除操作');
                // 这里可以添加实际的删除逻辑
            } else {
                console.log('用户取消');
            }
        });
    </script>
</body>

</html>
