<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖拽示例</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* 源区域 */
        .source-area {
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            min-height: 100px;
        }

        /* 可拖拽元素 */
        #source {
            display: inline-block;
            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: grab;
            font-weight: 500;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #source:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #source:active {
            cursor: grabbing;
        }

        /* 拖拽中状态 */
        #source.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        /* 目标区域 */
        #target {
            width: 220px;
            min-height: 220px;
            border: 2px dashed #ccc;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            background: #fafafa;
        }

        /* 拖拽进入目标区域 */
        #target.drag-over {
            border-color: #667eea;
            border-style: solid;
            background: #f0f3ff;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        #target.drag-over::before {
            content: '释放以放置';
            color: #667eea;
            font-size: 14px;
        }

        /* 放置后的元素 */
        #target #source {
            margin: 10px;
        }

        .placeholder {
            color: #999;
            font-size: 14px;
        }

        #target.drag-over .placeholder {
            display: none;
        }

        /* 重置按钮 */
        .reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2>拖拽示例</h2>

    <div class="container">
        <div class="source-area">
            <div id="source" draggable="true">拖拽我</div>
        </div>

        <div id="target">
            <span class="placeholder">拖放到这里</span>
        </div>
    </div>

    <button class="reset-btn" id="resetBtn">重置</button>

    <script>
        const source = document.getElementById('source');
        const target = document.getElementById('target');
        const resetBtn = document.getElementById('resetBtn');
        const sourceArea = document.querySelector('.source-area');

        // 1. 开始拖拽
        source.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', source.id); 
            e.dataTransfer.effectAllowed = 'move';
        });


        // 1.1 拖拽结束（无论成功与否）
        source.addEventListener('dragend', () => {
            source.classList.remove('dragging');
        });

        // 2. 经过目标区域
        target.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });

        // 2.1 进入目标区域
        target.addEventListener('dragenter', (e) => {
            e.preventDefault();
            target.classList.add('drag-over');
        });

        // 2.2 离开目标区域
        target.addEventListener('dragleave', (e) => {
            // 确保是离开目标本身，而非子元素
            if (!target.contains(e.relatedTarget)) {
                target.classList.remove('drag-over');
            }
        });

        // 3. 放置
        target.addEventListener('drop', (e) => {
            e.preventDefault();
            target.classList.remove('drag-over');

            const data = e.dataTransfer.getData('text/plain');
            const draggedEl = document.getElementById(data);

            // 避免重复添加
            if (draggedEl && !target.contains(draggedEl)) {
                // 移除占位符
                const placeholder = target.querySelector('.placeholder');
                if (placeholder) placeholder.remove();

                target.appendChild(draggedEl);
            }
        });

        // 4. 重置
        resetBtn.addEventListener('click', () => {
            source.classList.remove('dragging');
            sourceArea.appendChild(source);

            // 恢复占位符
            if (!target.querySelector('.placeholder')) {
                const span = document.createElement('span');
                span.className = 'placeholder';
                span.textContent = '拖放到这里';
                target.appendChild(span);
            }
        });
    </script>
</body>

</html>
